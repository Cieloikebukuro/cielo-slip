<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cielo — 管理画面</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--orange:#EB601B;--gold:#c9a84c;--cream:#faf7f2;--dark:#1a1614;--mid:#6b5d54;--border:#d4c9bc;--bg:#ffffff;--row-alt:#fdf9f5;--input-bg:#fffdf9;--shadow:0 2px 16px rgba(26,22,20,0.08)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--cream);color:var(--dark);font-size:14px;min-height:100vh;padding-bottom:60px}
.header{background:var(--dark);padding:18px 20px 14px;display:flex;align-items:flex-end;justify-content:space-between}
.logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--gold);letter-spacing:.12em}
.sub{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:.06em;margin-top:2px}
.header-back{font-size:11px;color:rgba(255,255,255,.5);text-decoration:none;border:1px solid rgba(255,255,255,.2);padding:5px 12px;border-radius:99px}
.tabs{display:flex;background:var(--dark);border-top:1px solid rgba(255,255,255,.08)}
.tab{flex:1;padding:12px;text-align:center;font-size:12px;color:rgba(255,255,255,.4);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.04em}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.panel{display:none;padding:14px}
.panel.active{display:block}
.card{background:var(--bg);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px}
.card-hd{background:var(--dark);padding:10px 16px;font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:500;color:var(--gold);letter-spacing:.1em}
.card-bd{padding:16px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.chip{display:flex;align-items:center;gap:6px;padding:6px 10px 6px 13px;border-radius:99px;font-size:12px;cursor:grab;user-select:none;transition:opacity .15s}
.chip.dragging{opacity:.4;cursor:grabbing}
.chip.drag-over{outline:2px solid var(--orange);outline-offset:2px}
.cs{background:var(--dark);color:rgba(255,255,255,.85)}
.cm{background:#f5ede3;color:var(--mid);border:1px solid var(--border)}
.chip-del{background:none;border:none;cursor:pointer;font-size:14px;line-height:1;padding:0;transition:color .15s}
.cs .chip-del{color:rgba(255,255,255,.35)}
.cs .chip-del:hover{color:#ff6b5b}
.cm .chip-del{color:#c0a898}
.cm .chip-del:hover{color:#c0392b}
.add-row{display:flex;gap:8px}
.add-input{flex:1;border:1px solid var(--border);border-radius:7px;padding:9px 12px;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--dark);background:var(--input-bg);outline:none}
.add-input:focus{border-color:var(--orange)}
.btn-add{background:var(--orange);color:white;border:none;border-radius:7px;padding:9px 16px;font-size:13px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;white-space:nowrap}
.df{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.df-lbl{font-size:11px;color:var(--mid);white-space:nowrap;font-weight:500}
.df-inp{border:1px solid var(--border);border-radius:7px;padding:8px 12px;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--dark);background:var(--input-bg);outline:none}
.df-inp:focus{border-color:var(--orange)}
.btn-today{background:transparent;border:1px solid var(--border);color:var(--mid);border-radius:7px;padding:8px 14px;font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.btn-today:hover{border-color:var(--orange);color:var(--orange)}
.sc{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px}
.sc-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#f5ede3;border-bottom:1px solid var(--border)}
.sc-name{font-weight:500;font-size:14px}
.sc-date{font-size:11px;color:var(--mid)}
.sc-total{font-size:14px;font-weight:500;color:var(--orange);font-family:'Cormorant Garamond',serif}
.sc-del{background:none;border:none;font-size:12px;color:#c0a898;cursor:pointer;padding:4px 8px;border-radius:5px}
.sc-del:hover{color:#c0392b;background:#fef0f0}
.sc-restore{background:none;border:1px solid var(--border);font-size:12px;color:var(--mid);cursor:pointer;padding:4px 8px;border-radius:5px}
.sc-restore:hover{color:var(--orange);border-color:var(--orange)}
.sc-mini{font-size:11px;color:var(--mid);padding:8px 14px;line-height:1.8}
.empty{text-align:center;padding:32px;color:var(--mid);font-size:13px;line-height:1.8}
.btn-pdf{width:100%;background:linear-gradient(135deg,var(--orange) 0%,#d4501a 100%);color:white;border:none;border-radius:10px;padding:16px;font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;letter-spacing:.06em;cursor:pointer;margin-bottom:10px}
.pdf-note{font-size:11px;color:var(--mid);text-align:center;line-height:1.7}
.sc-toggle{background:none;border:none;cursor:pointer;font-size:11px;color:var(--mid);padding:4px 8px;border-radius:5px;display:flex;align-items:center;gap:4px;transition:color .15s}
.sc-toggle:hover{color:var(--orange)}
.sc-toggle .arr{display:inline-block;transition:transform .2s;font-style:normal}
.sc-detail{display:none;border-top:1px solid var(--border)}
.sc-detail.open{display:block}
.sc-dtable{width:100%;border-collapse:collapse;font-size:11px}
.sc-dtable th{background:#fdf9f5;color:var(--mid);font-weight:500;font-size:10px;padding:5px 6px;text-align:center;border-bottom:1px solid #f0e8de;white-space:nowrap}
.sc-dtable th.L{text-align:left}
.sc-dtable td{padding:4px 6px;border-bottom:1px solid #f5ede3;vertical-align:middle;color:var(--dark)}
.sc-dtable td.R{text-align:right}
.sc-dtable td.C{text-align:center;color:var(--mid)}
.sc-dtable tr:last-child td{border-bottom:none}
.sc-dtable tr.tot td{background:#f5ede3;font-weight:500;color:var(--orange)}
.sc-extra{display:flex;gap:16px;padding:8px 12px;background:#fdf9f5;border-top:1px solid #f0e8de;font-size:11px;color:var(--mid);flex-wrap:wrap}
.sc-memo{padding:6px 12px 10px;font-size:11px;color:var(--mid);background:#fffdf9;border-top:1px solid #f0e8de}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--dark);color:var(--gold);padding:10px 20px;border-radius:99px;font-size:13px;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="header">
  <div><div class="logo">Cielo</div><div class="sub">管理画面</div></div>
  <a class="header-back" href="https://cieloikebukuro.github.io/cielo-slip/">← 入力へ戻る</a>
</div>
<div class="tabs">
  <div class="tab active" onclick="sw('Staff')">スタッフ</div>
  <div class="tab" onclick="sw('Menu')">施術メニュー</div>
  <div class="tab" onclick="sw('Data')">データ / PDF</div>
</div>

<div class="panel active" id="panelStaff">
  <div class="card">
    <div class="card-hd">Staff — スタッフ管理</div>
    <div class="card-bd">
      <div class="chips" id="staffChips"></div>
      <div class="add-row">
        <input class="add-input" id="staffInp" type="text" placeholder="名前（例：田中 花子）">
        <button class="btn-add" onclick="addStaff()">追加</button>
      </div>
      <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
        <button onclick="resetStaff()" style="background:transparent;border:1px solid var(--border);color:var(--mid);border-radius:7px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif">スタッフリストを初期値にリセット</button>
      </div>
    </div>
  </div>
</div>

<div class="panel" id="panelMenu">
  <div class="card">
    <div class="card-hd">Menu — 施術メニュー管理</div>
    <div class="card-bd">
      <div class="chips" id="menuChips"></div>
      <div class="add-row">
        <input class="add-input" id="menuInp" type="text" placeholder="メニュー名（例：C/Tr）">
        <button class="btn-add" onclick="addMenu()">追加</button>
      </div>
      <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
        <button onclick="resetMenu()" style="background:transparent;border:1px solid var(--border);color:var(--mid);border-radius:7px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif">メニューを初期値にリセット</button>
      </div>
    </div>
  </div>
</div>

<div class="panel" id="panelData">
  <div class="card">
    <div class="card-hd">PDF出力</div>
    <div class="card-bd">
      <div class="df">
        <span class="df-lbl">日付</span>
        <input class="df-inp" type="date" id="filterDate" onchange="loadDayStatus()">
        <button class="btn-today" onclick="setToday()">今日</button>
      </div>
      <div id="dayStatus" style="margin-bottom:12px;min-height:32px"></div>
      <button class="btn-pdf" onclick="printPDF()">この日のデータをA4でPDF出力</button>
      <div class="pdf-note">印刷画面が開きます。「PDFに保存」を選択してください。</div>
    </div>
  </div>
  <div class="card">
    <div class="card-hd">保存済みデータ</div>
    <div class="card-bd" id="slipList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const g=id=>document.getElementById(id);
const SB_URL='https://wrxpulxxppdrxkkjgvrm.supabase.co';
const SB_KEY='sb_publishable_vF9FUMNzkgpSe8Ex0QAGQg_AeT6e96F';
const sbH={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};

const DEFAULT_STAFF=['武塚 あや','小山 伸也','野田 はるか','佐藤 幸世','田部 未紗','伊藤 陽香','窪木 沙弥'];
const DEFAULT_MENU=['C','Co','P','S','Tr','SPA','C/Co','C/P','C/S','C/Tr','C/SPA'];

let staffList=[...DEFAULT_STAFF];
let menuList=[...DEFAULT_MENU];

async function saveSetting(key, value){
  await fetch(`${SB_URL}/rest/v1/settings`,{
    method:'POST',
    headers:{...sbH,'Prefer':'resolution=merge-duplicates'},
    body:JSON.stringify({key, value, updated_at:new Date().toISOString()})
  });
}

async function init(){
  try{
    const res=await fetch(`${SB_URL}/rest/v1/settings?key=in.(staff,menu)&select=key,value`,{headers:sbH});
    if(res.ok){
      const rows=await res.json();
      rows.forEach(r=>{
        if(r.key==='staff'&&Array.isArray(r.value))staffList=r.value;
        if(r.key==='menu'&&Array.isArray(r.value))menuList=r.value;
      });
    }
  }catch(e){}
  renderStaff();renderMenu();
}

function sw(t){
  ['Staff','Menu','Data'].forEach(n=>{
    document.querySelectorAll('.tab')[['Staff','Menu','Data'].indexOf(n)].classList.toggle('active',n===t);
    g('panel'+n).classList.toggle('active',n===t);
  });
  if(t==='Data')renderSlips();
}

function renderStaff(){
  const el=g('staffChips');
  if(!staffList.length){el.innerHTML='<span style="font-size:12px;color:var(--mid)">スタッフがいません</span>';return;}
  el.innerHTML=staffList.map((s,i)=>`
    <div class="chip cs" draggable="true" data-i="${i}">
      <span style="font-size:10px;color:rgba(255,255,255,.3);cursor:grab;margin-right:2px">⠿</span>
      ${s}<button class="chip-del" onclick="rmStaff(${i})">×</button>
    </div>`).join('');

  let dragIdx=null;
  el.querySelectorAll('.chip').forEach(chip=>{
    chip.addEventListener('dragstart',e=>{
      dragIdx=parseInt(chip.dataset.i);
      chip.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
    });
    chip.addEventListener('dragend',()=>chip.classList.remove('dragging'));
    chip.addEventListener('dragover',e=>{
      e.preventDefault();
      chip.classList.add('drag-over');
    });
    chip.addEventListener('dragleave',()=>chip.classList.remove('drag-over'));
    chip.addEventListener('drop',async e=>{
      e.preventDefault();
      chip.classList.remove('drag-over');
      const toIdx=parseInt(chip.dataset.i);
      if(dragIdx===null||dragIdx===toIdx)return;
      const moved=staffList.splice(dragIdx,1)[0];
      staffList.splice(toIdx,0,moved);
      renderStaff();
      await saveSetting('staff',staffList);
      showToast('並び順を保存しました ✓');
    });
  });
}
async function addStaff(){
  const inp=g('staffInp'),n=inp.value.trim();if(!n)return;
  if(staffList.includes(n)){showToast('すでに登録されています');return;}
  staffList.push(n);renderStaff();inp.value='';
  await saveSetting('staff',staffList);showToast('追加しました ✓');
}
async function rmStaff(i){
  if(!confirm(`「${staffList[i]}」を削除しますか？`))return;
  staffList.splice(i,1);renderStaff();
  await saveSetting('staff',staffList);showToast('削除しました');
}
async function resetStaff(){
  if(!confirm('スタッフリストを初期値に戻しますか？'))return;
  staffList=[...DEFAULT_STAFF];renderStaff();
  await saveSetting('staff',staffList);showToast('リセットしました ✓');
}
g('staffInp').addEventListener('keydown',e=>{if(e.key==='Enter')addStaff();});

function renderMenu(){
  g('menuChips').innerHTML=menuList.length
    ?menuList.map((m,i)=>`<div class="chip cm">${m}<button class="chip-del" onclick="rmMenu(${i})">×</button></div>`).join('')
    :'<span style="font-size:12px;color:var(--mid)">メニューがありません</span>';
}
async function addMenu(){
  const inp=g('menuInp'),n=inp.value.trim();if(!n)return;
  if(menuList.includes(n)){showToast('すでに登録されています');return;}
  menuList.push(n);renderMenu();inp.value='';
  await saveSetting('menu',menuList);showToast('追加しました ✓');
}
async function rmMenu(i){
  if(!confirm(`「${menuList[i]}」を削除しますか？`))return;
  menuList.splice(i,1);renderMenu();
  await saveSetting('menu',menuList);showToast('削除しました');
}
async function resetMenu(){
  if(!confirm('メニューを初期値に戻しますか？'))return;
  menuList=[...DEFAULT_MENU];renderMenu();
  await saveSetting('menu',menuList);showToast('リセットしました ✓');
}
g('menuInp').addEventListener('keydown',e=>{if(e.key==='Enter')addMenu();});

async function renderSlips(){
  const el=g('slipList');
  el.innerHTML='<div class="empty">読み込み中…</div>';
  const res=await fetch(`${SB_URL}/rest/v1/slips?select=*&order=date.desc,saved_at.desc`,{headers:sbH});
  if(!res.ok){el.innerHTML='<div class="empty">読み込みに失敗しました</div>';return;}
  const slips=await res.json();
  if(!slips.length){el.innerHTML='<div class="empty">保存されたデータがありません。<br>入力画面から保存してください。</div>';return;}

  el.innerHTML=slips.map(s=>{
    const rows=typeof s.rows==='string'?JSON.parse(s.rows):s.rows;
    const grand=calcGrand({...s,rows});
    const t=rows.reduce((a,r)=>{r.s.forEach((v,i)=>a[i]+=v);return a;},[0,0,0,0,0,0]);
    const fv=(v)=>v>0?'¥'+v.toLocaleString():'—';

    const detailRows=rows.map((r,ri)=>`
      <tr>
        <td class="C">${ri+1}</td>
        <td>${r.name||'—'}</td>
        <td class="C">${r.menu||'—'}</td>
        ${r.s.slice(0,4).map(v=>`<td class="R">${fv(v)}</td>`).join('')}
      </tr>`).join('');

    const totRow=`<tr class="tot">
      <td colspan="3" class="R" style="font-size:10px;color:var(--mid)">合　計</td>
      ${t.slice(0,4).map(v=>`<td class="R">${fv(v)}</td>`).join('')}
    </tr>`;

    const extras=[];
    if(s.hpb>0) extras.push(`HPB ▲¥${s.hpb.toLocaleString()}`);
    if(s.rakuten>0) extras.push(`楽天 ▲¥${s.rakuten.toLocaleString()}`);

    return`<div class="sc">
      <div class="sc-hd">
        <div><div class="sc-name">${s.staff}</div><div class="sc-date">${s.date}</div></div>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="sc-total">¥${grand.toLocaleString()}</span>
          <button class="sc-toggle" onclick="toggleDetail(this)">
            <i class="arr">▼</i> 内訳
          </button>
          <button class="sc-restore" onclick="restoreSlip(${JSON.stringify(s.staff)},${JSON.stringify(s.date)},${s.id})">復元</button>
          <button class="sc-del" onclick="delSlip(${s.id})">削除</button>
        </div>
      </div>
      <div class="sc-detail">
        <div style="overflow-x:auto;padding:10px 12px 0">
          <table class="sc-dtable">
            <thead><tr>
              <th style="width:20px">#</th>
              <th class="L" style="min-width:60px">お客様名</th>
              <th style="min-width:44px">メニュー</th>
              <th style="width:52px">新規/<br>フリー</th>
              <th style="width:44px">指名</th>
              <th style="width:44px">店販</th>
              <th style="width:44px">カラチケ</th>
            </tr></thead>
            <tbody>${detailRows}</tbody>
            <tfoot>${totRow}</tfoot>
          </table>
        </div>
        ${extras.length?`<div class="sc-extra">${extras.map(e=>`<span>${e}</span>`).join('')}</div>`:''}
        ${s.memo?`<div class="sc-memo">備考：${s.memo}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function toggleDetail(btn){
  const detail=btn.closest('.sc').querySelector('.sc-detail');
  const arr=btn.querySelector('.arr');
  const isOpen=detail.classList.toggle('open');
  arr.style.transform=isOpen?'rotate(180deg)':'';
}

async function restoreSlip(staff, date, id){
  if(!confirm(`「${staff}」(${date}) のデータを入力画面に復元しますか？`))return;
  // Supabaseから該当データを取得
  const res=await fetch(`${SB_URL}/rest/v1/slips?id=eq.${id}&select=*`,{headers:sbH});
  if(!res.ok){showToast('取得に失敗しました');return;}
  const rows=await res.json();
  if(!rows.length){showToast('データが見つかりません');return;}
  const s=rows[0];
  const draft={
    date: s.date,
    rows: typeof s.rows==='string'?JSON.parse(s.rows):s.rows,
    hpb: s.hpb||'',
    rakuten: s.rakuten||'',
    memo: s.memo||''
  };
  // localStorageに書き込んで入力画面へ
  localStorage.setItem(`cielo_draft_${s.date}_${s.staff}`, JSON.stringify(draft));
  showToast('復元しました。入力画面を開きます…');
  setTimeout(()=>{
    window.location.href='https://cieloikebukuro.github.io/cielo-slip/';
  }, 1000);
}

async function delSlip(id){
  if(!confirm('このデータを削除しますか？'))return;
  const res=await fetch(`${SB_URL}/rest/v1/slips?id=eq.${id}`,{method:'DELETE',headers:sbH});
  if(res.ok){showToast('削除しました');renderSlips();}
  else showToast('削除に失敗しました');
}

function calcGrand(s){
  const rows=typeof s.rows==='string'?JSON.parse(s.rows):s.rows;
  const t=rows.reduce((a,r)=>{r.s.forEach((v,i)=>a[i]=(a[i]||0)+v);return a;},[0,0,0,0]);
  return t[0]+t[1]+t[2]-(s.hpb||0)-(s.rakuten||0);
}

function setToday(){
  const d=new Date();
  g('filterDate').value=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  loadDayStatus();
}

async function loadDayStatus(){
  const date=g('filterDate').value;
  const el=g('dayStatus');
  if(!date){el.innerHTML='';return;}
  el.innerHTML='<span style="font-size:11px;color:var(--mid)">確認中…</span>';
  const res=await fetch(`${SB_URL}/rest/v1/slips?date=eq.${date}&select=staff,saved_at&order=saved_at.asc`,{headers:sbH});
  if(!res.ok){el.innerHTML='';return;}
  const slips=await res.json();
  if(!slips.length){
    el.innerHTML='<span style="font-size:11px;color:var(--mid)">この日の保存データはありません</span>';
    return;
  }
  const chips=slips.map(s=>{
    const t=new Date(s.saved_at);
    const hm=`${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
    return`<div style="display:inline-flex;align-items:center;gap:5px;background:#f5ede3;border:1px solid var(--border);border-radius:99px;padding:4px 12px;font-size:12px;color:var(--dark)">
      <span style="font-weight:500">${s.staff}</span>
      <span style="font-size:10px;color:var(--mid)">${hm}</span>
    </div>`;
  }).join('');
  el.innerHTML=`<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center">
    <span style="font-size:10px;color:var(--mid);font-weight:500;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap">保存済み ${slips.length}名</span>
    ${chips}
  </div>`;
}

async function printPDF(){
  const date=g('filterDate').value;
  if(!date){showToast('日付を選択してください');return;}
  showToast('データ取得中…');
  const res=await fetch(`${SB_URL}/rest/v1/slips?date=eq.${date}&select=*&order=saved_at.asc`,{headers:sbH});
  if(!res.ok){showToast('取得に失敗しました');return;}
  const rawSlips=(await res.json()).map(s=>({...s,rows:typeof s.rows==='string'?JSON.parse(s.rows):s.rows}));
  // staffListの順番でソート、登録外は末尾
  const slips=[...rawSlips].sort((a,b)=>{
    const ai=staffList.indexOf(a.staff), bi=staffList.indexOf(b.staff);
    if(ai===-1&&bi===-1)return 0;
    if(ai===-1)return 1;
    if(bi===-1)return -1;
    return ai-bi;
  });
  if(!slips.length){showToast('この日のデータがありません');return;}

  const fd=d=>{const[y,m,dy]=d.split('-');return`${y}年${parseInt(m)}月${parseInt(dy)}日`;};
  const fv=v=>v>0?v.toLocaleString():'—';
  const th=`background:#f0ebe3;padding:3px 3px;border:1px solid #ccc;font-weight:500;font-size:6.5pt;text-align:center;white-space:nowrap;line-height:1.3`;
  const thL=`${th};text-align:left`;
  const td=`padding:2.5px 3px;border:1px solid #ddd;vertical-align:middle;font-size:7.5pt`;
  const tdR=`${td};text-align:right`;
  const tdC=`${td};text-align:center;color:#bbb;font-size:7pt`;
  const sr=`display:flex;justify-content:space-between;padding:2.5px 7px;border-top:1px solid #eee;font-size:7.5pt`;

  let body=`<div style="font-family:'Noto Sans JP',sans-serif;padding:11mm;font-size:9pt;color:#1a1614">
    <div style="text-align:center;border-bottom:2px solid #1a1614;padding-bottom:3mm;margin-bottom:5mm">
      <div style="font-family:'Cormorant Garamond',serif;font-size:18pt;font-weight:600;letter-spacing:.15em">Cielo</div>
      <div style="font-size:9pt;color:#6b5d54;margin-top:1.5px;letter-spacing:.06em">日次売上伝票　${fd(date)}</div>
    </div>`;

  slips.forEach((s,si)=>{
    // s0=新規, s1=指名, s2=店販, s3=カラチケ
    const t=s.rows.reduce((a,r)=>{r.s.forEach((v,i)=>a[i]=(a[i]||0)+v);return a;},[0,0,0,0]);
    const cntShinki=s.rows.filter(r=>r.s[0]>0).length;
    const cntShimei=s.rows.filter(r=>r.s[1]>0).length;
    if(si>0) body+=`<div style="border-top:1px dashed #ccc;margin:4mm 0"></div>`;
    body+=`<div style="page-break-inside:avoid;margin-bottom:4mm">
      <div style="display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1.5px solid #1a1614;padding-bottom:2.5mm;margin-bottom:2.5mm">
        <div style="font-family:'Cormorant Garamond',serif;font-size:13pt;font-weight:600;letter-spacing:.1em">${s.staff}</div>
        <div style="font-size:8pt;color:#555">${fd(s.date)}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 32mm;gap:3mm;align-items:start">
        <table style="width:100%;border-collapse:collapse;">
          <thead><tr>
            <th style="${th};width:14px">#</th>
            <th style="${thL};min-width:50px">お客様名</th>
            <th style="${thL};min-width:46px">施術内容</th>
            <th style="${th};width:33px">新規/<br>フリー</th>
            <th style="${th};width:30px">指名</th>
            <th style="${th};width:30px">店販</th>
            <th style="${th};width:30px">カラ<br>チケ</th>
          </tr></thead>
          <tbody>`;
    s.rows.forEach((r,ri)=>{
      body+=`<tr style="${ri%2===1?'background:#fdf9f5':''}">
        <td style="${tdC}">${ri+1}</td>
        <td style="${td}">${r.name||'—'}</td>
        <td style="${td}">${r.menu||'—'}</td>
        ${r.s.slice(0,4).map(v=>`<td style="${tdR}">${fv(v)}</td>`).join('')}
      </tr>`;
    });
    body+=`</tbody>
          <tfoot><tr style="background:#f5ede3;font-weight:500">
            <td colspan="3" style="${td};text-align:right;color:#6b5d54;font-size:7pt">合　計</td>
            ${t.map(v=>`<td style="${tdR};color:#EB601B">${fv(v)}</td>`).join('')}
          </tr></tfoot>
        </table>
        <div style="border:1px solid #ccc;border-radius:2px;overflow:hidden">
          <div style="background:#f0ebe3;padding:3px 7px;font-size:7pt;font-weight:500;color:#555">その他</div>
          <div style="${sr}"><span>新規・フリー 客数</span><span style="font-weight:500">${cntShinki}人</span></div>
          <div style="${sr}"><span>指名 客数</span><span style="font-weight:500">${cntShimei}人</span></div>
          <div style="${sr}"><span>HPB(P)</span><span style="font-weight:500">${s.hpb>0?'▲¥'+s.hpb.toLocaleString():'—'}</span></div>
          <div style="${sr}"><span>楽天(P)</span><span style="font-weight:500">${s.rakuten>0?'▲¥'+s.rakuten.toLocaleString():'—'}</span></div>
        </div>
      </div>
      ${s.memo?`<div style="margin-top:2mm;font-size:7.5pt;color:#6b5d54">備考：${s.memo}</div>`:''}
    </div>`;
  });

  // ── 日次サマリーページ ──
  const totalShinki=slips.reduce((a,s)=>a+s.rows.reduce((b,r)=>b+(r.s[0]||0),0),0);
  const totalShimei=slips.reduce((a,s)=>a+s.rows.reduce((b,r)=>b+(r.s[1]||0),0),0);
  const totalTenhan=slips.reduce((a,s)=>a+s.rows.reduce((b,r)=>b+(r.s[2]||0),0),0);
  const totalHPB=slips.reduce((a,s)=>a+(s.hpb||0),0);
  const totalRakuten=slips.reduce((a,s)=>a+(s.rakuten||0),0);
  const totalUriage=totalShinki+totalShimei;
  const fmt2=v=>v>0?'¥'+v.toLocaleString():'¥—';
  const srow=(label,val,sub)=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 12px;border-bottom:1px solid #f0e8de">
      <span style="font-size:9pt;color:#6b5d54">${label}</span>
      <span style="font-family:'Cormorant Garamond',serif;font-size:13pt;font-weight:600;color:${sub?'#c0392b':'#1a1614'}">${val}</span>
    </div>`;

  body+=`</div>
  <div style="font-family:'Noto Sans JP',sans-serif;padding:11mm;font-size:9pt;color:#1a1614;page-break-before:always">
    <div style="text-align:center;border-bottom:2px solid #1a1614;padding-bottom:3mm;margin-bottom:6mm">
      <div style="font-family:'Cormorant Garamond',serif;font-size:18pt;font-weight:600;letter-spacing:.15em">Cielo</div>
      <div style="font-size:9pt;color:#6b5d54;margin-top:1.5px;letter-spacing:.06em">日次集計　${fd(date)}</div>
    </div>
    <div style="max-width:180mm;margin:0 auto">
      <div style="background:#f5ede3;padding:4px 12px;font-size:7.5pt;font-weight:500;color:#6b5d54;letter-spacing:.06em;margin-bottom:2px">売上</div>
      ${srow('新規・フリー合計',fmt2(totalShinki))}
      ${srow('指名合計',fmt2(totalShimei))}
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:2px solid #1a1614;background:#fdf9f5">
        <span style="font-size:9pt;font-weight:500">売上合計（新規＋指名）</span>
        <span style="font-family:'Cormorant Garamond',serif;font-size:16pt;font-weight:600;color:#EB601B">${fmt2(totalUriage)}</span>
      </div>
      ${srow('店販合計',fmt2(totalTenhan))}
      <div style="margin-top:6mm">
        <div style="background:#f5ede3;padding:4px 12px;font-size:7.5pt;font-weight:500;color:#6b5d54;letter-spacing:.06em;margin-bottom:2px">ポイント控除</div>
        ${srow('HPBポイント合計',fmt2(totalHPB),true)}
        ${srow('楽天ポイント合計',fmt2(totalRakuten),true)}
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:2px solid #1a1614;background:#fdf9f5">
          <span style="font-size:9pt;font-weight:500">ポイント合計</span>
          <span style="font-family:'Cormorant Garamond',serif;font-size:16pt;font-weight:600;color:#c0392b">▲${fmt2(totalHPB+totalRakuten)}</span>
        </div>
      </div>
      <div style="margin-top:8mm;padding:10px 12px;background:#1a1614;border-radius:4px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:9pt;color:rgba(255,255,255,.7)">純売上合計</span>
        <span style="font-family:'Cormorant Garamond',serif;font-size:18pt;font-weight:600;color:#c9a84c">${fmt2(totalUriage-totalHPB-totalRakuten)}</span>
      </div>
      <div style="margin-top:10mm;font-size:8pt;color:#aaa;text-align:right">${slips.length}名分のデータ</div>
    </div>
  </div>`;

  const w=window.open('','_blank','width=794,height=1123');
  w.document.write(`<!DOCTYPE html><html lang="ja"><head>
    <meta charset="UTF-8"><title>Cielo 日次伝票 ${date}</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
    <style>*{box-sizing:border-box;margin:0;padding:0}body{margin:0;padding:0}@page{size:A4;margin:0}</style>
  </head><body>${body}</body></html>`);
  w.document.close();
  w.onload=()=>setTimeout(()=>w.print(),600);
}

function showToast(msg){
  const t=g('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

init();setToday();loadDayStatus();
</script>
</body>
</html>
